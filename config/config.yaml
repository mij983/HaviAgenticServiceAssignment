embedding:
  model: "all-MiniLM-L6-v2"         # sentence-transformer model (runs locally, no API key)

vector_db:
  path: "data/chroma_db"             # ChromaDB persistent storage
  collection: "snow_tickets"         # collection name inside ChromaDB
  top_k: 5                           # how many similar tickets to retrieve

llm:
  provider: "ollama"                 # ollama runs the LLM locally
  model: "gemma:2b"                   # "gemma:2b" for lighter model
  temperature: 0.1                   # low = more deterministic
  max_tokens: 512

data:
  csv_path: "data/training_tickets.csv"

